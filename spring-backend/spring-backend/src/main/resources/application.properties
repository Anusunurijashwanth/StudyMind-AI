spring.application.name=spring-backend

# Base URL for the external AI service the app calls. Change this to the real host/port where your AI service runs.
# Default currently points to localhost:5000 but can be overridden per environment.
ai.service.base-url=http://127.0.0.1:8000
spring.data.mongodb.uri=mongodb://localhost:27017/studymind_ai
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB